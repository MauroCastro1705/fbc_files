<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FBC - Acceso</title>
<link rel="icon" type="image/png" href="fbc_logo_icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url('fbc_logo.png');
    background-repeat: no-repeat;
    background-position: center;
    background-size: 30%;
    opacity: 0.03;
    pointer-events: none;
    z-index: -1;
}

.login-container {
    width: 100%;
    max-width: 420px;
}

.login-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: 0 16px 64px rgba(0,0,0,0.5);
}

.login-logo {
    display: block;
    height: 52px;
    margin: 0 auto 32px;
    opacity: 0.8;
}

.login-title {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    color: var(--text);
    margin-bottom: 24px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.form-group {
    margin-bottom: 16px;
}

.form-label {
    display: block;
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text3);
    margin-bottom: 6px;
}

.form-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color var(--tr), box-shadow var(--tr);
}

.form-input::placeholder {
    color: var(--text3);
}

.form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
}

.form-error {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    margin-top: 6px;
    display: none;
}

.form-error.visible {
    display: block;
}

.login-btn {
    width: 100%;
    background: var(--accent);
    border: 1px solid var(--accent2);
    border-radius: var(--radius);
    color: white;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    padding: 12px;
    cursor: pointer;
    margin-top: 8px;
    transition: background var(--tr), transform var(--tr);
}

.login-btn:hover {
    background: #c40818;
    transform: translateY(-1px);
}

.login-btn:active {
    transform: translateY(0);
}

.switch-form {
    text-align: center;
    margin-top: 20px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
}

.switch-form a {
    color: var(--accent);
    cursor: pointer;
    text-decoration: none;
}

.switch-form a:hover {
    text-decoration: underline;
}

.hidden {
    display: none;
}

.tab-buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
}

.tab-btn {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: color var(--tr), border-color var(--tr);
}

.tab-btn:hover {
    color: var(--text);
}

.tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
}

.import-textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 12px 14px;
    outline: none;
    transition: border-color var(--tr), box-shadow var(--tr);
    resize: vertical;
    min-height: 120px;
}

.import-textarea::placeholder {
    color: var(--text3);
}

.import-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
}

.import-hint {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 12px;
    text-align: center;
}

.import-buttons {
    display: flex;
    gap: 10px;
    margin-top: 8px;
}

.import-buttons button {
    flex: 1;
}

.clear-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    padding: 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background var(--tr), transform var(--tr);
}

.clear-btn:hover {
    background: var(--border);
    transform: translateY(-1px);
}

.clear-btn:active {
    transform: translateY(0);
}

.import-success {
    font-family: var(--font-mono);
    font-size: 11px;
    color: #4ade80;
    margin-top: 6px;
    display: none;
}

.import-success.visible {
    display: block;
}
</style>
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <img src="fbc_logo.png" alt="FBC" class="login-logo"/>
        
        <div class="tab-buttons">
            <button class="tab-btn active" id="tab-login" onclick="showLogin()">Acceso</button>
            <button class="tab-btn" id="tab-register" onclick="showRegister()">Registrarse</button>
            <button class="tab-btn" id="tab-import" onclick="showImport()">Importar</button>
        </div>
        
        <div id="login-form">
            <div class="login-title">Acceso al Sistema</div>
            
            <div class="form-group">
                <label class="form-label">Usuario</label>
                <input type="text" class="form-input" id="login-username" placeholder="Ingrese usuario" autocomplete="off"/>
            </div>
            
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-input" id="login-password" placeholder="Ingrese contraseña"/>
            </div>
            
            <div class="form-error" id="login-error"></div>
            
            <button class="login-btn" onclick="handleLogin()">Ingresar</button>
            
            <div class="switch-form">
                ¿No tiene cuenta? <a onclick="showRegister()">Registrarse</a>
            </div>
        </div>
        
        <div id="register-form" class="hidden">
            <div class="login-title">Nuevo Usuario</div>
            
            <div class="form-group">
                <label class="form-label">Usuario</label>
                <input type="text" class="form-input" id="reg-username" placeholder="Nombre de usuario" autocomplete="off"/>
            </div>
            
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-input" id="reg-password" placeholder="Contraseña"/>
            </div>
            
            <div class="form-error" id="reg-error"></div>
            
            <button class="login-btn" onclick="handleRegister()">Crear Cuenta</button>
            
            <div class="switch-form">
                ¿Ya tiene cuenta? <a onclick="showLogin()">Ingresar</a>
            </div>
        </div>
        
        <div id="import-form" class="hidden">
            <div class="login-title">Importar Cuenta</div>
            
            <div class="import-hint">Pegue aquí el código de exportación de su cuenta</div>
            
            <div class="form-group">
                <textarea class="import-textarea" id="import-code" placeholder="Pegue el código de exportación (base64)..."></textarea>
            </div>
            
            <div class="form-error" id="import-error"></div>
            <div class="import-success" id="import-success"></div>
            
            <div class="import-buttons">
                <button class="login-btn" onclick="handleImport()">Importar Cuenta</button>
                <button class="clear-btn" onclick="clearImportForm()">Limpiar</button>
            </div>
        </div>
    </div>
</div>

<script>
async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function getStoredUsers() {
    try {
        const stored = localStorage.getItem('fbc_users');
        if (stored) return JSON.parse(stored);
    } catch(e) {}
    return [];
}

async function saveUsers(users) {
    localStorage.setItem('fbc_users', JSON.stringify(users));
}

async function handleLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');
    
    errorEl.classList.remove('visible');
    
    if (!username || !password) {
        errorEl.textContent = 'Ingrese usuario y contraseña';
        errorEl.classList.add('visible');
        return;
    }
    
    const users = getStoredUsers();
    const passwordHash = await hashPassword(password);
    
    const user = users.find(u => u.username === username && u.password === passwordHash);
    
    if (!user) {
        errorEl.textContent = 'Usuario o contraseña incorrectos';
        errorEl.classList.add('visible');
        return;
    }
    
    sessionStorage.setItem('fbc_auth', JSON.stringify({
        username: user.username,
        level: user.level,
        xp: user.xp || 0,
        loggedAt: Date.now()
    }));
    
    window.location.href = 'home.html';
}

async function handleRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    const level = 1;
    const errorEl = document.getElementById('reg-error');
    
    errorEl.classList.remove('visible');
    
    if (!username || !password) {
        errorEl.textContent = 'Complete todos los campos';
        errorEl.classList.add('visible');
        return;
    }
    
    if (username.length < 3) {
        errorEl.textContent = 'El usuario debe tener al menos 3 caracteres';
        errorEl.classList.add('visible');
        return;
    }
    
    if (password.length < 4) {
        errorEl.textContent = 'La contraseña debe tener al menos 4 caracteres';
        errorEl.classList.add('visible');
        return;
    }
    
    let users = getStoredUsers();
    
    if (users.find(u => u.username === username)) {
        errorEl.textContent = 'El usuario ya existe';
        errorEl.classList.add('visible');
        return;
    }
    
    const newUser = {
        username,
        password: await hashPassword(password),
        level,
        xp: 0,
        createdAt: Date.now()
    };
    
    users.push(newUser);
    await saveUsers(users);
    
    sessionStorage.setItem('fbc_auth', JSON.stringify({
        username: newUser.username,
        level: newUser.level,
        xp: newUser.xp,
        loggedAt: Date.now()
    }));
    
    window.location.href = 'home.html';
}

function showLogin() {
    document.getElementById('login-form').classList.remove('hidden');
    document.getElementById('register-form').classList.add('hidden');
    document.getElementById('import-form').classList.add('hidden');
    document.getElementById('login-error').classList.remove('visible');
    document.getElementById('reg-error').classList.remove('visible');
    document.getElementById('import-error').classList.remove('visible');
    
    document.getElementById('tab-login').classList.add('active');
    document.getElementById('tab-register').classList.remove('active');
    document.getElementById('tab-import').classList.remove('active');
}

function showRegister() {
    document.getElementById('login-form').classList.add('hidden');
    document.getElementById('register-form').classList.remove('hidden');
    document.getElementById('import-form').classList.add('hidden');
    document.getElementById('login-error').classList.remove('visible');
    document.getElementById('reg-error').classList.remove('visible');
    document.getElementById('import-error').classList.remove('visible');
    
    document.getElementById('tab-login').classList.remove('active');
    document.getElementById('tab-register').classList.add('active');
    document.getElementById('tab-import').classList.remove('active');
}

function showImport() {
    document.getElementById('login-form').classList.add('hidden');
    document.getElementById('register-form').classList.add('hidden');
    document.getElementById('import-form').classList.remove('hidden');
    document.getElementById('login-error').classList.remove('visible');
    document.getElementById('reg-error').classList.remove('visible');
    document.getElementById('import-error').classList.remove('visible');
    
    document.getElementById('tab-login').classList.remove('active');
    document.getElementById('tab-register').classList.remove('active');
    document.getElementById('tab-import').classList.add('active');
}

function checkAuth() {
    const auth = sessionStorage.getItem('fbc_auth');
    if (auth) {
        window.location.href = 'home.html';
    }
}

checkAuth();

// Initialize default admin user if no users exist
(async function initDefaultUser() {
    let users = getStoredUsers();
    if (users.length === 0) {
        users = [{
            username: 'admin',
            password: await hashPassword('admin'),
            level: 5,
            xp: 750,
            createdAt: Date.now()
        }];
        await saveUsers(users);
    }
})();

// Enter key submit
document.getElementById('login-password').addEventListener('keypress', e => {
    if (e.key === 'Enter') handleLogin();
});

// Import user data functions
function decodeExportCode(code) {
    try {
        const cleaned = code.trim();
        if (!cleaned) {
            throw new Error('El código está vacío');
        }
        
        const decoded = atob(cleaned);
        const data = JSON.parse(decoded);
        
        if (!data.u || data.l === undefined) {
            throw new Error('Formato de código inválido: datos requeridos faltantes');
        }
        
        return {
            username: data.u,
            level: data.l,
            xp: data.x || 0,
            favorites: data.f || [],
            viewedImages: data.v || []
        };
    } catch (e) {
        if (e.message.includes('datos requeridos')) return null;
        throw new Error('Error al decodificar: El código no es válido');
    }
}

function importUserData(importedUser) {
    let users = getStoredUsers();
    
    // Find existing user with same username
    const existingIndex = users.findIndex(u => u.username === importedUser.username);
    
    // Create new user object with imported data and preserved password from existing or default
    const newUserData = {
        username: importedUser.username,
        password: existingIndex >= 0 ? users[existingIndex].password : '', // Keep existing password or empty
        level: importedUser.level,
        xp: importedUser.xp,
        createdAt: existingIndex >= 0 ? users[existingIndex].createdAt : Date.now(),
        viewedImages: importedUser.viewedImages || [],
        favorites: importedUser.favorites || []
    };
    
    if (existingIndex >= 0) {
        // Overwrite existing user
        users[existingIndex] = newUserData;
    } else {
        // Add new user
        users.push(newUserData);
    }
    
    localStorage.setItem('fbc_users', JSON.stringify(users));
    return newUserData;
}

function autoLoginUser(user) {
    sessionStorage.setItem('fbc_auth', JSON.stringify({
        username: user.username,
        level: user.level,
        xp: user.xp || 0,
        loggedAt: Date.now()
    }));
}

async function handleImport() {
    const code = document.getElementById('import-code').value;
    const errorEl = document.getElementById('import-error');
    const successEl = document.getElementById('import-success');
    const importBtn = event.target;
    
    errorEl.classList.remove('visible');
    successEl.classList.remove('visible');
    
    if (!code.trim()) {
        errorEl.textContent = 'Por favor pegue el código de exportación';
        errorEl.classList.add('visible');
        return;
    }
    
    try {
        const importedUser = decodeExportCode(code);
        if (!importedUser) {
            errorEl.textContent = 'El código no contiene datos válidos de usuario';
            errorEl.classList.add('visible');
            return;
        }
        
        // Import and store the user
        const savedUser = importUserData(importedUser);
        
        // Show success message
        successEl.textContent = `✓ Cuenta importada exitosamente: ${savedUser.username}`;
        successEl.classList.add('visible');
        
        // Auto-login after brief delay
        importBtn.disabled = true;
        importBtn.textContent = 'Importando...';
        
        setTimeout(() => {
            autoLoginUser(savedUser);
            window.location.href = 'home.html';
        }, 1000);
        
    } catch (error) {
        errorEl.textContent = error.message || 'Error desconocido al importar';
        errorEl.classList.add('visible');
    }
}

function clearImportForm() {
    document.getElementById('import-code').value = '';
    document.getElementById('import-error').classList.remove('visible');
    document.getElementById('import-success').classList.remove('visible');
    document.getElementById('import-code').focus();
}
</script>

</body>
</html>
