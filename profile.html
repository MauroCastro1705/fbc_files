<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FBC - Perfil de Usuario</title>
<link rel="icon" type="image/png" href="fbc_logo_icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
body {
    background: var(--bg);
    height: 100vh;
    overflow: hidden;
}

html {
    height: 100%;
}

#layout {
    display: flex;
    flex-direction: column;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
}

.profile-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 24px;
}

.profile-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
}

.profile-avatar {
    width: 72px;
    height: 72px;
    background: var(--bg3);
    border: 2px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--accent);
}

.profile-info h1 {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
}

.profile-rank {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
}

.xp-section {
    margin-bottom: 28px;
}

.xp-label {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text3);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
}

.xp-bar-container {
    width: 100%;
    height: 12px;
    background: var(--bg3);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
}

.xp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 6px;
    transition: width 1.2s ease;
    position: relative;
}

.xp-bar-fill::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    animation: shimmer 2s infinite;
}

@keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

.permissions-section h2 {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
    margin-bottom: 16px;
}

.permission-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
}

.permission-status {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
}

.permission-status.active {
    background: #27ae60;
    box-shadow: 0 0 6px rgba(39, 174, 96, 0.3);
}

.permission-status.inactive {
    background: var(--border);
    opacity: 0.3;
}

.permission-name {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    flex: 1;
}

.permission-desc {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--font-sans);
}

.back-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 16px;
    cursor: pointer;
    margin-top: 8px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.back-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
}

.level-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
}

.level-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
}

.level-dot.unlocked {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
}

.code-area {
    margin-top: 24px;
    padding: 20px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 11px;
    word-break: break-all;
    color: var(--text2);
    display: none;
}

.code-area.visible {
    display: block;
}

.code-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 8px 12px;
    cursor: pointer;
    margin-right: 8px;
    margin-top: 8px;
}

.code-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
}

.import-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 10px;
    margin-top: 12px;
    outline: none;
}

.import-input:focus {
    border-color: var(--accent);
}

.favorite-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
}

.favorite-item:last-child {
    border-bottom: none;
}

.favorite-star {
    color: #f39c12;
    font-size: 16px;
}

.favorite-details {
    flex: 1;
}

.favorite-name {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
}

.favorite-category {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--font-sans);
}

.favorite-added {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--font-mono);
}

/* 3 column layout */
.profile-3col-section {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
    margin-top: 24px;
    overflow: visible;
    width: 100%;
}

.profile-col {
    min-width: 0;
    overflow: visible;
}

/* Favorites list styles */
.fav-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: background var(--tr);
}

.fav-link:hover {
    background: var(--bg3);
    border-radius: var(--radius);
}

.fav-link:last-child {
    border-bottom: none;
}

.fav-icon {
    font-size: 14px;
}

.fav-text {
    flex: 1;
    overflow: hidden;
}

.fav-name {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.fav-cat {
    font-size: 10px;
    color: var(--text3);
}

.fav-arrow {
    font-size: 10px;
    color: var(--text3);
}

/* ── RESPONSIVE: Tablet and smaller ── */
@media (max-width: 768px) {
    #layout {
        padding: 20px 16px;
    }

    .profile-card {
        padding: 24px;
    }

    /* Stack 3 columns into 2 columns */
    .profile-3col-section {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
    }

    /* Make favorites column span full width */
    .profile-col:last-child {
        grid-column: 1 / -1;
    }
}

/* ── RESPONSIVE: Mobile (matches project breakpoint at 520px) ── */
@media (max-width: 520px) {
    #layout {
        padding: 12px 8px;
    }

    .profile-card {
        padding: 16px;
        margin-bottom: 16px;
    }

    /* Stack everything in single column */
    .profile-3col-section {
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 16px;
    }

    .profile-col:last-child {
        grid-column: auto;
    }

    /* Smaller profile header */
    .profile-header {
        gap: 12px;
        margin-bottom: 20px;
        padding-bottom: 16px;
    }

    .profile-avatar {
        width: 56px;
        height: 56px;
        font-size: 22px;
    }

    .profile-info h1 {
        font-size: 18px;
    }

    .profile-rank {
        font-size: 12px;
    }

    /* Smaller XP section */
    .xp-section {
        margin-bottom: 20px;
    }

    .xp-label {
        font-size: 10px;
    }

    .xp-bar-container {
        height: 10px;
    }

    /* Section titles */
    .permissions-section h2 {
        font-size: 12px;
        margin-bottom: 12px;
    }

    /* Permission items */
    .permission-item {
        gap: 8px;
        padding: 8px 0;
    }

    .permission-name {
        font-size: 11px;
    }

    .permission-desc {
        font-size: 10px;
    }

    /* Buttons */
    .back-btn {
        font-size: 11px;
        padding: 8px 12px;
    }

    .code-btn {
        font-size: 11px;
        padding: 10px 12px;
        min-height: 44px;
    }

    /* Import input */
    .import-input {
        font-size: 12px;
        padding: 10px;
    }

    /* Favorite items */
    .fav-link {
        gap: 8px;
        padding: 8px;
    }

    .fav-name {
        font-size: 11px;
    }

    .fav-cat {
        font-size: 9px;
    }

    /* Code area */
    .code-area {
        font-size: 10px;
        padding: 12px;
        margin-top: 16px;
    }

    /* Topbar adjustments */
    .topbar-right {
        gap: 4px;
    }

    .topbar-right .back-btn {
        padding: 6px 10px;
        font-size: 11px;
    }
}

/* ── RESPONSIVE: Very small screens ── */
@media (max-width: 360px) {
    #layout {
        padding: 8px 4px;
    }

    .profile-card {
        padding: 12px;
    }

    .profile-avatar {
        width: 48px;
        height: 48px;
        font-size: 20px;
    }

    .profile-info h1 {
        font-size: 16px;
    }

    .profile-rank {
        font-size: 11px;
    }

    .topbar-right .back-btn {
        font-size: 10px;
        padding: 6px 8px;
    }
}

/* Collapsable sections - ONLY mobile */
@media (max-width: 520px) {
    .collapsable-mobile .section-toggle {
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        user-select: none;
    }

    .collapsable-mobile .section-toggle::after {
        content: "▶";
        font-size: 10px;
        transition: transform 0.3s ease;
        color: var(--text3);
    }

    .collapsable-mobile.expanded .section-toggle::after {
        transform: rotate(90deg);
    }

    .collapsable-mobile .section-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
    }

    .collapsable-mobile.expanded .section-content {
        max-height: 1000px;
    }
}

/* Desktop - always expanded */
@media (min-width: 521px) {
    .collapsable-mobile .section-toggle::after {
        display: none;
    }

    .collapsable-mobile .section-content {
        max-height: none !important;
        overflow: visible;
    }
}
</style>
</head>
<body>

<div id="topbar">
  <a href="home.html" class="logo-link"><img src="fbc_logo.png" alt="FBC files" class="logo"/></a>
  <div style="flex: 1;"></div>
  <div class="topbar-right">
    <a href="index.html" class="back-btn" style="margin-right: 8px;">📁 Archivos FBC</a>
    <a href="home.html" class="back-btn">← Volver</a>
  </div>
</div>

<div id="layout">
    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar" style="padding: 6px;">
              <img src="user_icon.png" style="width: 100%; height: 100%; object-fit: contain;" alt=""/>
            </div>
            <div class="profile-info">
                <h1 id="profile-username">Cargando...</h1>
                <div class="profile-rank">
                    <span id="profile-level-name"></span>
                </div>
                <div class="level-indicator" id="level-dots"></div>
            </div>
        </div>

        <div class="xp-section">
            <div class="xp-label">
                <span>Progreso de nivel</span>
                <span id="xp-text">0 / 1000 XP</span>
            </div>
            <div class="xp-bar-container">
                <div class="xp-bar-fill" id="xp-bar" style="width: 0%"></div>
            </div>
        </div>

        <div class="profile-3col-section">

            <div class="profile-col">
                <div class="permissions-section">
                    <h2>Herramientas</h2>
                    <button class="code-btn" style="width: 100%; margin: 6px 0;" onclick="exportUserCode()">📤 Exportar Código de Usuario</button>
                    <button class="code-btn" style="width: 100%; margin: 6px 0;" onclick="showImport()">📥 Importar Usuario</button>
                    
                    <div class="code-area" id="export-code"></div>
                    <button class="code-btn" id="copy-code-btn" style="display: none; margin-top: 8px;" onclick="copyCode()">📋 Copiar código</button>

                    <div id="import-section" style="display: none; margin-top: 12px;">
                        <input type="text" class="import-input" id="import-code-input" placeholder="Pegar código de usuario aquí" autocomplete="off"/>
                        <button class="code-btn" style="margin-top: 8px;" onclick="importUserCode()">Importar</button>
                    </div>
                </div>
            </div>
            <div class="profile-col">
                <div class="permissions-section">
                    <h2>⭐ Documentos Favoritos</h2>
                    <div id="favorites-list">
                        <div style="color: var(--text3); font-size: 12px; padding: 16px 0; text-align: center;">No tienes imágenes favoritas</div>
                    </div>
                </div>
            </div>
            <div class="profile-col">
                <div class="permissions-section collapsable-mobile">
                    <h2 class="section-toggle">Permisos de acceso</h2>
                    <div class="section-content" id="permissions-list"></div>
                </div>
            </div>
        </div>

    </div>

</div>

<script>
// Collapsable sections for mobile
document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.collapsable-mobile .section-toggle').forEach(toggle => {
        const section = toggle.parentElement;
        
        // Start COLLAPSED by default on mobile, expanded on desktop
        if (window.innerWidth <= 520) {
            section.classList.remove('expanded');
        } else {
            section.classList.add('expanded');
        }

        toggle.addEventListener('click', () => {
            if (window.innerWidth <= 520) {
                section.classList.toggle('expanded');
            }
        });
    });
});

// Update state on window resize
window.addEventListener('resize', () => {
    document.querySelectorAll('.collapsable-mobile').forEach(section => {
        if (window.innerWidth > 520) {
            section.classList.add('expanded');
        }
    });
});
</script>
<script src="profile.js"></script>

</body>
</html>
